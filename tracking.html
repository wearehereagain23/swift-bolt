<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>Swift Bolt | Track & Trace</title>

  <link href="css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
  <link rel="shortcut icon" href="images/favicon.png" type="image/x-icon">
  <link rel="icon" href="images/favicon.png" type="image/x-icon">

  <meta http-equiv="X-UA-Compatible" content="IE=edge">

  <!--[if lt IE 9]><script src="js/respond.js"></script><![endif]-->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.css">

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="sweetalert2.min.js"></script>
  <link rel="stylesheet" href="sweetalert2.min.css">
  <script src="./config.js"></script>
  <script type="module">

    function showSpinnerModal() {
      document.getElementById('spinnerModal').style.display = 'flex';
    }

    function hideSpinnerModal() {
      document.getElementById('spinnerModal').style.display = 'none';
    }


    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
    const supabase = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_KEY);



    let formDAT = document.getElementById('codex');
    formDAT.addEventListener('submit', async (event) => {
      event.preventDefault();
      const formData = new FormData(formDAT);
      let trackid = (formData.get('search'));

      async function fetchData() {
        showSpinnerModal();

        const { data, error } = await supabase
          .from('swift_bolt')
          .select('*')
          .eq('trackingcode', trackid);
        if (error) {
          alert('network error')
        } else {

          hideSpinnerModal()
          if (data.length == 0) {
            Swal.fire({
              title: 'ERROR',
              text: "Invalid tracking number!",
              icon: 'error',
              showCancelButton: false,
              allowOutsideClick: false,
              allowEscapeKey: false,
              confirmButtonText: 'OK!'
            })
          } else {
            data.forEach(doc => {
              if (doc.trackingStatus == 'active') {
                window.location.href = `./tracking/index.html?i=${doc.trackingcode}`
              } else {
                Swal.fire({
                  title: 'ERROR',
                  text: `${doc.disableMessage}`,
                  icon: 'error',
                  showCancelButton: false,
                  allowOutsideClick: false,
                  allowEscapeKey: false,
                  confirmButtonText: 'OK!'
                })
              }


            });
          }
        }
      } fetchData();

    });
    //  window.location.href = `../trackingpage/index.html?i=${docSnap.data().trackingcode}&url=${docSnap.data().mapurl}`
  </script>

</head>

<body>
  <script src="https://cdn.jsdelivr.net/npm/notyf@3/notyf.min.js"></script>

  <script>

                        d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0" />
                    </svg></button>
                </div>
              </form>
              <p><u>What is a shipment or container number?</u></p>

  <!-- SPINNER CSS -->
  <style>
    .spinner-modal {

    .spinner {

      border-radius: 50%;
      width: 50px;
      height: 50px;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }

    @keyframes spin {
