<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
<style>
  #map {
    width: 100%;
    height: 100vh;
  }
</style>
</head>
<body>
   <div id="map">

   </div> 

   <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
   <!-- <link rel="stylesheet" href="https://unpkg.com/leaflet@1.2.0/dist/leaflet.css" /> -->
<link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.css" />
<script src="https://unpkg.com/leaflet@1.2.0/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet-routing-machine@latest/dist/leaflet-routing-machine.js"></script>


<script>
    var map = L.map('map').setView([36.837536, 11.958224], 3);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
    // minZoom:2,
}).addTo(map);


var myIcon = L.icon({
     iconUrl: 'red.png',
    iconSize: [48, 55],
      iconAnchor: [24, 40],
    popupAnchor: [-1, -25],
});



 L.circle([34.115021, -3.100948],{
    color: 'red',
    fillColor: '#f03',
    opacity: 0.7,
    radius: 500,
    weight: 20
}).addTo(map);



// var marker2 = L.marker([34.115021, -3.100948],{icon: myIcon});
// marker2.addTo(map)
// .bindPopup('Shipment.<br>On the way.')
// .openPopup();




var marker2 = L.marker([34.115021, -3.100948], 
 {icon: myIcon}).addTo(map)
    .bindPopup('Home')
     .openPopup();

    L.Routing.control({
      show: false,
    waypoints: [
      L.latLng(34.115021, -3.100948),
      L.latLng(36.836811, 11.963284)
    ],
    lineOptions: {
      styles: [{color: 'red', opacity: 0.5, weight: 2}]
   }
}).on('routesfound', function(e) {
})
.addTo(map);





 var marker = L.marker([36.837536, 11.958224], 
 {icon: myIcon}).addTo(map)
    .bindPopup('Shipment.<br>On the way.')
     .openPopup();

    L.Routing.control({
      show: false,
    waypoints: [
      L.latLng(36.837536, 11.958224),
      L.latLng(36.836811, 11.963284)
    ],
    lineOptions: {
      styles: [{color: 'green', opacity: 1, weight: 5}]
   }
}).on('routesfound', function(e) {
    e.routes[0].coordinates.forEach(function(coord, index){
   
        setTimeout(()=>{
           marker.setLatLng([coord.lat, coord.lng])
            console.log(coord.lat, coord.lng)
        }, 479000 * index);
    })
})
.addTo(map);



</script>
</body>
</html>
