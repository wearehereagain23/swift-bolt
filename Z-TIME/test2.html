    <script>

        document.addEventListener("DOMContentLoaded", function (event) {

            const showNavbar = (toggleId, navId, bodyId, headerId) => {
                const toggle = document.getElementById(toggleId),
                    nav = document.getElementById(navId),
                    bodypd = document.getElementById(bodyId),
                    headerpd = document.getElementById(headerId)

                // Validate that all variables exist
                if (toggle && nav && bodypd && headerpd) {
                    toggle.addEventListener('click', () => {
                        // show navbar
                        nav.classList.toggle('show')
                        // change icon
                        toggle.classList.toggle('bx-x')
                        // add padding to body
                        bodypd.classList.toggle('body-pd')
                        // add padding to header
                        headerpd.classList.toggle('body-pd')
                    })
                }
            }

            showNavbar('header-toggle', 'nav-bar', 'body-pd', 'header')

            /*===== LINK ACTIVE =====*/
            const linkColor = document.querySelectorAll('.nav_link')

            function colorLink() {
                if (linkColor) {
                    linkColor.forEach(l => l.classList.remove('active'))
                    this.classList.add('active')
                }
            }
            linkColor.forEach(l => l.addEventListener('click', colorLink))

            // Your code to run since DOM is loaded and ready
        });

    </script>

    <script type="module">


        const urlParams = new URLSearchParams(window.location.search);
        const USERID = urlParams.get('i');


        // Import the functions you need from the SDKs you need
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, query, onSnapshot, collection, orderBy, where } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js";
        import { getAuth, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js";

        // TODO: Add SDKs for Firebase products that you want to use
        // https://firebase.google.com/docs/web/setup#available-libraries

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAvEfPdq7dnEuiBiducH8PmQqtKS_Xd0Ew",
            authDomain: "Swift Bolt.firebaseapp.com",
            projectId: "Swift Bolt",
            storageBucket: "Swift Bolt.appspot.com",
            messagingSenderId: "877833019857",
            appId: "1:877833019857:web:d8c1259a03a324c58a80f0"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);



        onAuthStateChanged(auth, (user) => {
            if (user) {

                //SAVE TIME
                let date = new Date();
                let options = { timeZone: 'Africa/Lagos' };
                let eastCoastTime = date.toLocaleString("en-US", { timeZone: 'Africa/Algiers' })

                //current Date & Time in miliseconds
                const currentTime = new Date(eastCoastTime).getTime();


                const formDAT = document.getElementById('fomm');

                formDAT.addEventListener('submit', event => {
                    event.preventDefault();
                    const formData = new FormData(formDAT);
                    let lat1 = (formData.get('lat1'));
                    let lat2 = (formData.get('lat2'));

                    let dlat1 = (formData.get('dlat1'));
                    let dlng1 = (formData.get('dlng1'));

                    let lng1 = (formData.get('lng1'));
                    let lng2 = (formData.get('lng2'));

                    let timing = (formData.get('timing'));





                    if (formData) {
                        setDoc(doc(db, "map3", USERID), {
                            lat1: lat1,
                            lat2: lat2,
                            lng1: lng1,
                            lng2: lng2,
                            dlat1: dlat1,
                            dlng1: dlng1,
                            timing: timing,
                            currentTime: currentTime,
                        }).then(() => {
                            location.reload();
                        })
                    }

                })

                // GETTING THE DATA FROM FIREBASE

                const unsub = onSnapshot(doc(db, "map3", USERID), (doc) => {
                    let lat1 = doc.data().lat1;
                    let lat2 = doc.data().lat2;
                    let lng1 = doc.data().lng1;
                    let lng2 = doc.data().lng2;

                    let dlat1 = doc.data().dlat1;
                    let dlng1 = doc.data().dlng1;
                    document.getElementById('lat1').value = doc.data().lat1;
                    document.getElementById('lat2').value = doc.data().lat2;
                    document.getElementById('lng1').value = doc.data().lng1;
                    document.getElementById('lng2').value = doc.data().lng2;

                    document.getElementById('dlat1').value = doc.data().dlat1;
                    document.getElementById('dlng1').value = doc.data().dlng1;
                    document.getElementById('timing').value = doc.data().timing;

                    //SWITCH VALUE

                    if (localStorage.getItem('lat')) {
                        let slat = localStorage.getItem('lat');
                        let slat2 = localStorage.getItem('lng');
                    } else {
                        let slat = doc.data().lat1;
                        let slat2 = doc.data().lat2;
                    }
                    // let slat = doc.data().lat1;
                    // let slat2 = doc.data().lat2;


                    let mily = doc.data().timing;
                    let mily_sec = Math.floor(mily / 1000);

                    //GLOBAL TIME

                    let comparetime = currentTime - doc.data().currentTime;
                    let timespent = comparetime / 1000;
                    let totaltime = Math.floor(timespent / mily_sec);
                    console.log('timming this', totaltime)
                    var map = L.map('map').setView([dlat1, dlng1], 3);

                    L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        // minZoom:2,
                    }).addTo(map);


                    L.circle([dlat1, dlng1], {
                        className: 'pulse',
                        weight: 25
                    }).addTo(map)

                    var markerz = L.marker([dlat1, dlng1]).addTo(map)
                        .bindPopup('Delivery location.')
                        .openPopup();

                    L.circle([lat1, lat2], {
                        color: 'red',
                        fillColor: '#f03',
                        opacity: 0.7,
                        radius: 500,
                        weight: 20
                    }).addTo(map);


                    var marker = L.marker([lat1, lat2]).addTo(map)
                        .bindPopup('Home')
                        .openPopup();

                    L.Routing.control({
                        show: false,
                        waypoints: [
                            L.latLng(slat, slat2),
                            L.latLng(lng1, lng2)
                        ],
                        lineOptions: {
                            styles: [{ color: 'red', opacity: 0.5, weight: 2 }]
                        }
                    }).on('routesfound', function (e) {

                        // IF YOU COME BACK CONSOLE.LOG THE STATEMENT BELOW = marker.setLatLng([e.routes[0].coordinates[totaltime].lat, e.routes[0].coordinates[totaltime].lng])
                        //console.log('from coordinates', e.routes[0].coordinates[totaltime].lng)
                        //marker.setLatLng([e.routes[0].coordinates[totaltime].lat, e.routes[0].coordinates[totaltime].lng])


                        e.routes[0].coordinates.forEach(function (coord, index) {
                            marker.setLatLng([e.routes[0].coordinates[totaltime].lat, e.routes[0].coordinates[totaltime].lng])
                            localStorage.setItem('lat', e.routes[0].coordinates[totaltime].lat)
                            localStorage.setItem('lng', e.routes[0].coordinates[totaltime].lng)
                            setTimeout(() => {
                                marker.setLatLng([coord.lat, coord.lng])
                            }, 1000 * index);
                        })
                    }).addTo(map);
                });


            } else {
                window.location.replace("login.html");
            }

        });




        document.getElementById('logout').addEventListener('click', () => {
            signOut(auth).then(() => {
                window.location.replace("./login.html");
            }).catch((error) => {
                notyf.error(error);
            });

        });
    </script>

    <style>
        @import url("https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap");

        :root {
            --header-height: 3rem;
            --nav-width: 68px;
            --first-color: #442302;
            --first-color-light: #AFA5D9;
            --white-color: #F7F6FB;
            --body-font: 'Nunito', sans-serif;
            --normal-font-size: 1rem;
            --z-fixed: 100
        }

        *,
        ::before,
        ::after {
            box-sizing: border-box
        }

        body {
            position: relative;
            margin: var(--header-height) 0 0 0;
            padding: 0 1rem;
            font-family: var(--body-font);
            font-size: var(--normal-font-size);
            transition: .5s
        }

        a {
            text-decoration: none
        }

        .header {
            width: 100%;
            height: var(--header-height);
            position: fixed;
            top: 0;
            left: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 1rem;
            background-color: var(--white-color);
            z-index: var(--z-fixed);
            transition: .5s
        }

        .header_toggle {
            color: var(--first-color);
            font-size: 1.5rem;
            cursor: pointer
        }

        .header_img {
            width: 35px;
            height: 35px;
            display: flex;
            justify-content: center;
            border-radius: 50%;
            overflow: hidden
        }

        .header_img img {
            width: 40px
        }

        .l-navbar {
            position: fixed;
            top: 0;
            left: -30%;
            width: var(--nav-width);
            height: 100vh;
            background-color: var(--first-color);
            padding: .5rem 1rem 0 0;
            transition: .5s;
            z-index: var(--z-fixed)
        }

        .nav {
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            overflow: hidden
        }

        .nav_logo,
        .nav_link {
            display: grid;
            grid-template-columns: max-content max-content;
            align-items: center;
            column-gap: 1rem;
            padding: .5rem 0 .5rem 1.5rem
        }

        .nav_logo {
            margin-bottom: 2rem
        }

        .nav_logo-icon {
            font-size: 1.25rem;
            color: var(--white-color)
        }

        .nav_logo-name {
            color: var(--white-color);
            font-weight: 700
        }

        .nav_link {
            position: relative;
            color: var(--first-color-light);
            margin-bottom: 1.5rem;
            transition: .3s
        }

        .nav_link:hover {
            color: var(--white-color)
        }

        .nav_icon {
            font-size: 1.25rem
        }

        .show {
            left: 0
        }

        .body-pd {
            padding-left: calc(var(--nav-width) + 1rem)
        }

        .active {
            color: var(--white-color)
        }

        .active::before {
            content: '';
            position: absolute;
            left: 0;
            width: 2px;
            height: 32px;
            background-color: var(--white-color)
        }

        .height-100 {
            height: 100vh
        }

            body {
                margin: calc(var(--header-height) + 1rem) 0 0 0;
                padding-left: calc(var(--nav-width) + 2rem)
            }

            .header {
                height: calc(var(--header-height) + 1rem);
                padding: 0 2rem 0 calc(var(--nav-width) + 2rem)
            }

            .header_img {
                width: 40px;
                height: 40px
            }

            .header_img img {
                width: 45px
            }

            .l-navbar {
                left: 0;
                padding: 1rem 1rem 0 0
            }
